# 1. Oracle Veritabanı Bağlantı Bilgileri
spring.datasource.url=jdbc:oracle:thin:@localhost:1533/XEPDB1
spring.datasource.username=i2i_user
spring.datasource.password=i2i_password
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# 2. Flyway Otomatik Tablo Oluşturma Ayarları
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# 3. Konsolda Yapılan SQL İşlemlerini Canlı Görmek İçin
spring.jpa.show-sql=true
